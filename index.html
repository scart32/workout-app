<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Workout Tracker</title>

  <style>
    :root{
      color-scheme: dark;

      --bg0:#070812;
      --bg1:#0b0f22;

      --text:#f3f6ff;
      --muted:#a8b0c6;
      --muted2: rgba(168,176,198,.72);

      --accent:#7c5cff;
      --accent2:#2de2e6;

      --stroke: rgba(255,255,255,.10);
      --stroke2: rgba(255,255,255,.14);

      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --glow: 0 0 0 3px rgba(124,92,255,.12);

      --r:16px;
      --r2:18px;

      --safeTop: env(safe-area-inset-top);
      --safeBottom: env(safe-area-inset-bottom);

      /* iPhone 12 compact tuning */
      --pad:10px;
      --gap:8px;

      /* Fixed button sizing so nothing wraps */
      --btnW: 56px;      /* exercise prev/next */
      --btnWorkW: 148px; /* prev/next workout */
    }

    *{box-sizing:border-box;}
    html, body{
      height:100%;
      overflow:hidden;
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
      touch-action: manipulation;
    }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 900px at 15% -10%, rgba(124,92,255,.42), transparent 60%),
        radial-gradient(900px 700px at 110% 20%, rgba(45,226,230,.30), transparent 55%),
        radial-gradient(700px 600px at 50% 110%, rgba(45,212,191,.15), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color:var(--text);
      height:100dvh;
      max-width: 980px;
      margin-inline:auto;
      padding: calc(8px + var(--safeTop)) 10px calc(8px + var(--safeBottom)) 10px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom: var(--gap);
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
      line-height:1;
      min-width:0;
    }
    .brand h1{
      margin:0;
      font-size:13px;
      font-weight:950;
      letter-spacing:.2px;
      opacity:.95;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand .small{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chips{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:nowrap;
      justify-content:flex-end;
      min-width:0;
    }
    .chip{
      background: rgba(255,255,255,.06);
      border:1px solid var(--stroke);
      padding:6px 8px;
      border-radius:999px;
      font-size:11px;
      color:var(--muted);
      backdrop-filter: blur(10px);
      user-select:none;
      white-space:nowrap;
    }
    .chip strong{ color:var(--text); font-weight:950; }
    .chipBtn{ cursor:pointer; }

    .main{
      height: calc(100dvh - var(--safeTop) - var(--safeBottom) - 16px - 40px);
      display:flex;
      flex-direction:column;
      gap: var(--gap);
      overflow:hidden;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: var(--pad);
      overflow:hidden;
    }

    button{
      appearance:none;
      border:1px solid var(--stroke2);
      background: rgba(255,255,255,.06);
      color:var(--text);
      border-radius: 14px;
      padding:10px 10px;
      font-size:12px;
      cursor:pointer;
      font-weight:950;
      letter-spacing:.15px;
      line-height:1;
      white-space:nowrap;
      flex:0 0 auto;
    }
    button:active{transform: translateY(1px);}
    button:disabled{opacity:.40; cursor:not-allowed;}

    .btnPrimary{
      border-color: rgba(124,92,255,.60);
      background: rgba(124,92,255,.22);
      box-shadow: var(--glow);
    }
    .btnGhost{
      background: rgba(0,0,0,.12);
      border-color: rgba(255,255,255,.14);
    }
    .btnDanger{
      border-color: rgba(251,113,133,.55);
      background: rgba(251,113,133,.14);
    }

    input, textarea{
      font-family: inherit;
      color: var(--text);
      background: rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding:10px 12px;
      font-size: 12px;
      outline:none;
      width:100%;
    }
    textarea{
      resize:none;
      min-height: 80px;
      line-height: 1.35;
    }
    input::placeholder, textarea::placeholder{ color: rgba(168,176,198,.62); font-weight:700; }

    .view{ height: 100%; display:none; }
    .view.active{ display:flex; flex-direction:column; gap: var(--gap); }

    #view-workout{ height:100%; }

    .workoutHeader{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      min-width:0;
    }
    .workoutHeader .left{ min-width:0; flex:1; }
    .labelTop{
      font-size:11px;
      color:var(--muted);
      font-weight:900;
      letter-spacing:.4px;
      white-space:nowrap;
    }
    #workoutTitle{
      margin:4px 0 0 0;
      font-size:14px;
      font-weight:950;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    #workoutSubtitle{
      margin-top:4px;
      font-size:11px;
      color:var(--muted2);
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .progressWrap{ display:flex; flex-direction:column; gap:6px; }
    .progressMeta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:11px;
      color:var(--muted);
      font-weight:850;
      white-space:nowrap;
    }
    .bar{
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      overflow:hidden;
    }
    .bar > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius:999px;
      transition: width .25s ease;
    }

    .stack{
      flex: 1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap: var(--gap);
      overflow:hidden;
    }

    .activePane{
      flex: 1 1 auto;
      min-height: 0;
      border-radius: var(--r2);
      border:1px solid rgba(124,92,255,.38);
      background: rgba(0,0,0,.20);
      box-shadow: var(--glow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .paneHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-bottom:1px solid rgba(255,255,255,.08);
      white-space:nowrap;
    }
    .paneHeader b{
      font-size:11px;
      letter-spacing:.55px;
      text-transform:uppercase;
      color:rgba(168,176,198,.92);
      font-weight:950;
    }
    .paneHeader .count{
      font-size:11px;
      color:rgba(168,176,198,.82);
      font-weight:850;
    }

    .activeBody{
      flex:1 1 auto;
      min-height:0;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
    }

    .activeLine{
      display:flex;
      align-items:center;
      gap:8px;
      width:100%;
      min-width:0;
      white-space:nowrap;
    }
    #activeTitle{
      margin:0;
      font-size:13px;
      font-weight:950;
      line-height:1.1;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      min-width:0;
      flex:1 1 auto;
    }
    .exNav{
      display:flex;
      gap:8px;
      flex:0 0 auto;
      flex-wrap:nowrap;
    }
    .exNav button{
      width: var(--btnW);
      padding:10px 0;
      text-align:center;
    }

    #activeMeta{
      font-size:11px;
      color:var(--muted);
      font-weight:850;
      display:flex;
      gap:6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* ✅ FIX: checkbox was getting clipped on iPhone.
       Remove scale-transform and give it a fixed size + extra left padding. */
    .checkRow{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 12px;              /* slightly more left padding */
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      user-select:none;
      cursor:pointer;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;                 /* keep clean */
    }
    .checkRow input{
      -webkit-appearance: checkbox;
      appearance: checkbox;
      width: 20px;                     /* fixed size so it won't clip */
      height: 20px;
      margin: 0 0 0 2px;               /* nudge off the edge */
      padding: 0;
      accent-color: var(--accent2);
      flex:0 0 auto;
      background: transparent;
    }
    .checkRow .label{
      font-size:12px;
      font-weight:950;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      min-width:0;
      flex:1 1 auto;
    }

    .benchSets{
      display:none;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      padding:10px;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .benchSets.show{ display:flex; }
    .benchSets .left{
      font-size:11px;
      color: rgba(168,176,198,.9);
      font-weight:900;
      white-space:nowrap;
    }
    .benchPills{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:nowrap;
    }
    .benchPill{
      width:30px;
      height:30px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:950;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: rgba(243,246,255,.92);
      user-select:none;
      cursor:pointer;
      flex: 0 0 auto;
    }
    .benchPill.done{
      border-color: rgba(45,212,191,.55);
      background: rgba(45,212,191,.16);
      color: rgba(243,246,255,.98);
      box-shadow: 0 0 0 3px rgba(45,212,191,.12);
    }

    .iframeBox{
      display:none;
      position:relative;
      width:100%;
      padding-top:50%;
      border-radius: 16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:#000;
    }
    .iframeBox.show{ display:block; }
    iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

    .timerCard{
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    #timerBig{
      font-variant-numeric: tabular-nums;
      font-size: 44px;
      font-weight: 950;
      text-align:center;
      padding: 10px 10px;
      background: rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.08);
      white-space:nowrap;
    }
    .timerInner{
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    #timerExerciseName{
      font-size:11px;
      color:var(--muted2);
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .timerCustomRow{
      display:flex;
      gap:8px;
      align-items:center;
      white-space:nowrap;
    }
    .timerCustomRow label{
      font-size:11px;
      color:var(--muted);
      font-weight:900;
      white-space:nowrap;
    }
    #timerSecondsInput{
      flex:1;
      padding:9px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color: var(--text);
      font-size: 12px;
      outline:none;
      min-width:0;
    }
    .timerBtns{
      display:flex;
      gap:8px;
      width:100%;
      flex-wrap:nowrap;
      white-space:nowrap;
    }
    .timerBtns button{
      flex:1;
      padding:10px 0;
      border-radius: 14px;
      font-size:12px;
    }

    .nextPane{
      flex:0 0 auto;
      border-radius: var(--r2);
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .nextBody{
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
    }

    .nextLine{
      display:flex;
      align-items:flex-start;
      gap:8px;
      width:100%;
      min-width:0;
      white-space:nowrap;
    }
    #nextTitle{
      margin:0;
      font-size:12px;
      font-weight:950;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      min-width:0;
      flex:1 1 auto;
    }

    .workNav{
      display:flex;
      gap:8px;
      flex:0 0 auto;
      flex-wrap:nowrap;
      align-items:flex-start;
    }
    .workNavCol{
      width: var(--btnWorkW);
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      min-width: var(--btnWorkW);
      max-width: var(--btnWorkW);
    }
    .workNavCol button{
      width: 100%;
      padding:10px 0;
      text-align:center;
    }
    .workNavLabel{
      width:100%;
      font-size:10.5px;
      color: rgba(168,176,198,.70);
      font-weight:850;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
    }

    #markCompleteBtn{
      width:100%;
      padding:12px 10px;
      font-size:13px;
      font-weight:950;
    }

    #view-history{ height:100%; }

    .historyHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      white-space:nowrap;
    }
    .historyHeader h2{
      margin:0;
      font-size:14px;
      font-weight:950;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .historyControls{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:nowrap;
    }
    .historyControls button{ padding:10px 12px; }

    .calWeekdays{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap:8px;
      margin-top:6px;
      margin-bottom:8px;
      color: var(--muted);
      font-size:11px;
      text-align:center;
      font-weight:850;
      letter-spacing:.2px;
    }
    .calGrid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap:8px;
      flex:1 1 auto;
      min-height:0;
    }
    .calDay{
      position:relative;
      min-height: 48px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      padding:8px;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      overflow:hidden;
    }
    .calDay:hover{ background: rgba(255,255,255,.06); }
    .calDay:active{ transform: translateY(1px); }
    .calDay.muted{ opacity:.35; cursor:default; }
    .calNum{ font-weight:950; font-size:12px; }
    .calDot{
      position:absolute; right:8px; bottom:8px;
      width:10px; height:10px; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 3px rgba(124,92,255,.14);
    }
    .calSelected{
      border-color: rgba(45,212,191,.85);
      box-shadow: 0 0 0 3px rgba(45,212,191,.15);
    }

    .toast{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(18px + env(safe-area-inset-bottom));
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.16);
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--text);
      backdrop-filter: blur(10px);
      display:none;
      z-index: 999;
      white-space:nowrap;
    }

    .overlay{
      position: fixed;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 1000;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      padding:16px;
    }
    .celebrateCard{
      width: min(520px, 92vw);
      border-radius: 18px;
      padding: 16px;
      border:1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow: var(--shadow);
      position: relative;
      overflow:hidden;
    }
    .celebrateTitle{margin:0;font-size:18px;font-weight:950;}
    .celebrateMsg{margin:10px 0 0 0;color:rgba(242,244,255,.92);line-height:1.35;font-size:14px;}
    .sparkles{
      position:absolute;inset:-40px;opacity:.9;pointer-events:none;
      background:
        radial-gradient(circle at 10% 20%, rgba(124,92,255,.55), transparent 35%),
        radial-gradient(circle at 90% 30%, rgba(45,226,230,.45), transparent 40%),
        radial-gradient(circle at 50% 90%, rgba(45,212,191,.35), transparent 45%);
      filter: blur(2px);
      animation: floaty 1.4s ease-in-out infinite alternate;
    }
    @keyframes floaty{ from{ transform: translateY(0px); } to{ transform: translateY(-8px); } }
    .confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .confetti i{
      position:absolute; top:-20px;
      width:10px;height:14px;border-radius:3px;opacity:.9;
      animation: fall 1.1s linear forwards;
    }
    @keyframes fall{ to{ transform: translateY(110vh) rotate(360deg); opacity: 1; } }

    .modalOverlay{
      position: fixed;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 1100;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      padding:16px;
    }
    .modalCard{
      width: min(820px, 92vw);
      max-height: 82dvh;
      border-radius: 18px;
      padding: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .modalTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      white-space:nowrap;
    }
    .modalTop h3{
      margin:0;
      font-size:14px;
      font-weight:950;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .modalList{
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:2px;
    }
    .modalItem{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      border-radius: 14px;
      padding:10px;
    }
    .modalItemTitle{
      font-weight:950;
      font-size:13px;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      white-space:nowrap;
    }
    .pill{
      font-size:10px;
      font-weight:950;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(243,246,255,.92);
      flex:0 0 auto;
    }
    .pill.manual{
      border-color: rgba(45,212,191,.45);
      background: rgba(45,212,191,.10);
    }
    .pill.workout{
      border-color: rgba(124,92,255,.55);
      background: rgba(124,92,255,.14);
    }

    .modalItemSmall{
      margin-top:6px;
      font-size:11px;
      color:var(--muted);
      font-weight:850;
    }
    .modalItemExercises{
      margin-top:8px;
      font-size:11px;
      color:rgba(242,244,255,.92);
      line-height:1.35;
      font-weight:800;
    }
    .modalActions{
      margin-top:10px;
      display:flex;
      justify-content:flex-end;
    }

    .manualForm{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.14);
      border-radius: 14px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .formRow{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .formRow .col{ flex:1; min-width:0; }
    .formRow .colSmall{ width: 120px; min-width:120px; max-width:120px; }
    .formLabel{
      font-size:11px;
      color: rgba(168,176,198,.82);
      font-weight:900;
      margin-bottom:6px;
      display:block;
    }

    .flash{
      position: fixed;
      inset: 0;
      z-index: 1500;
      pointer-events: none;
      background: rgba(255,255,255,.92);
      opacity: 0;
      transition: opacity .10s ease;
    }
    .flash.on{
      opacity: 1;
      pointer-events: auto;
    }
    .flashHoldHint{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(24px + env(safe-area-inset-bottom));

    }

  </style>
</head>

<div class="flash" id="flashHold"></div>
<div class="flashHoldHint" id="flashHoldHint">Timer done — tap to advance</div>

<script>
/* ===== DATE KEY (America/Chicago) ===== */
function getLocalDateKey() {
  return new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/Chicago",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).format(new Date());
}
let todayKey = getLocalDateKey();

/* ===== FALLBACK ===== */
const DEFAULT_WORKOUTS = [
  {
    id: "w1",
    title: "Workout 1 – Rack Upper (Fallback)",
    videos: [
      { label: "Rack Video #2", url: "https://www.youtube.com/watch?v=agELHJBNCuw&t=2s" },
      { label: "Rack Video #4", url: "https://www.youtube.com/watch?v=1Kj-OLK9VR0" }
    ],
    exercises: [
      { label: "Rack Video #2", type: "videoRef" },
      { label: "Rack Video #4", type: "videoRef" }
    ]
  }
];

const STORAGE_KEY = "workout_app_state_v_calendar_json1";
const SOUND_KEY   = "sound_enabled_global_v_calendar_json1";

const $ = (id)=>document.getElementById(id);
const toastEl = $("toast");
function toast(msg){
  toastEl.textContent = msg;
  toastEl.style.display = "block";
  setTimeout(()=> toastEl.style.display = "none", 1500);
}
function loadJSON(key, fallback){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch{ return fallback; }
}
function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

function toEmbedUrl(url){
  const m = url?.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{6,})/);
  return m ? `https://www.youtube.com/embed/${m[1]}` : "";
}
function formatTime(sec){
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return m>0 ? `${m}:${String(s).padStart(2,"0")}` : `${sec}s`;
}

/* ===== SOUND (no UI toggle) ===== */
let soundEnabled = (localStorage.getItem(SOUND_KEY) ?? "true") === "true";
let audioCtx = null;
let audioUnlocked = false;
function ensureAudio(){
  if(!audioCtx){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return null;
    audioCtx = new AudioCtx();
  }
  return audioCtx;
}
async function unlockAudio(){
  try{
    const ctx = ensureAudio();
    if(!ctx) return;
    if(ctx.state === "suspended") await ctx.resume();
    audioUnlocked = true;
  }catch{}
}
function beep(freq=880, ms=120){
  if(!soundEnabled) return;
  const ctx = ensureAudio();
  if(!ctx || ctx.state === "suspended") return;
  try{
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sine"; o.frequency.value = freq;
    g.gain.value = 0.06;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(), ms);
  }catch{}
}
function successChime(){ beep(880,120); setTimeout(()=>beep(1175,140),140); }
["pointerdown","touchstart","keydown"].forEach(evt=>{
  window.addEventListener(evt, ()=>{ if(!audioUnlocked) unlockAudio(); }, { once:true, passive:true });
});

/* ===== LOAD workouts.json ===== */
let WORKOUTS = [];
async function loadWorkoutsFromFile(){
  try{
    const res = await fetch("./workouts.json", { cache: "no-store" });
    if(!res.ok) throw new Error("Missing workouts.json");
    const data = await res.json();
    if(!Array.isArray(data) || data.length === 0) throw new Error("Invalid workouts.json");
    WORKOUTS = data;
  }catch(err){
    console.warn("Fallback workouts:", err);
    WORKOUTS = DEFAULT_WORKOUTS;
    toast("Using fallback workouts");
  }
}

/* ===== STATE ===== */
const defaultState = {
  lastDate: "",
  currentIndex: 0,
  checks: {},
  activeByKey: {},
  timer: { running:false, remaining:0, duration:0, workoutId:"", exerciseIndex:-1, finished:false },
  timerOverrides: {},
  setChecks: {},
  history: []
};
let state = loadJSON(STORAGE_KEY, defaultState);
let currentIndex = 0;
let timerInterval = null;

/* ===== VIEW SWITCH ===== */
function setView(which){
  $("view-workout").classList.toggle("active", which==="workout");
  $("view-history").classList.toggle("active", which==="history");
}

/* ===== HELPERS ===== */
function stopTimerHard(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  state.timer.running = false;
  saveJSON(STORAGE_KEY, state);
}
function workoutDayKey(workoutId){ return `${todayKey}::${workoutId}`; }
function getChecksFor(workoutId){ return state.checks[workoutDayKey(workoutId)] || {}; }
function setCheck(workoutId, idx, v){
  const k = workoutDayKey(workoutId);
  if(!state.checks[k]) state.checks[k] = {};
  state.checks[k][idx] = v;
  saveJSON(STORAGE_KEY, state);
}
function isCheckable(ex){ return ex.type !== "section"; }
function isTimed(ex){ return typeof ex.seconds === "number" && ex.seconds > 0; }
function isRackVideo(ex){ return ex?.type === "videoRef"; }

/* Bench detection */
function isBenchSetsExercise(ex){
  const t = (ex?.label || "").toLowerCase();
  return t.includes("bench") && (t.includes("set") || t.includes("sets"));
}
function benchKey(workoutId, exerciseIndex){
  return `${todayKey}::${workoutId}::${exerciseIndex}`;
}
function getBenchArray(workoutId, exerciseIndex, size=5){
  if(!state.setChecks) state.setChecks = {};
  const k = benchKey(workoutId, exerciseIndex);
  let arr = state.setChecks[k];
  if(!Array.isArray(arr) || arr.length !== size){
    arr = new Array(size).fill(false);
    state.setChecks[k] = arr;
    saveJSON(STORAGE_KEY, state);
  }
  return arr;
}
function setBenchValue(workoutId, exerciseIndex, setIdx, val){
  const arr = getBenchArray(workoutId, exerciseIndex, 5);
  arr[setIdx] = !!val;
  state.setChecks[benchKey(workoutId, exerciseIndex)] = arr;
  saveJSON(STORAGE_KEY, state);
  return arr;
}

function setActiveIndex(workoutId, idx){
  state.activeByKey[workoutDayKey(workoutId)] = idx;
  saveJSON(STORAGE_KEY, state);
}
function getActiveIndex(workout){
  const k = workoutDayKey(workout.id);
  const saved = state.activeByKey[k];
  if(typeof saved === "number") return saved;
  // default: first unchecked if possible
  const checks = getChecksFor(workout.id);
  for(let i=0;i<workout.exercises.length;i++){
    if(isCheckable(workout.exercises[i]) && !checks[i]) { setActiveIndex(workout.id, i); return i; }
  }
  for(let i=0;i<workout.exercises.length;i++){
    if(isCheckable(workout.exercises[i])) { setActiveIndex(workout.id, i); return i; }
  }
  setActiveIndex(workout.id, 0);
  return 0;
}
function findFirstUncheckedIndex(workout){
  const checks = getChecksFor(workout.id);
  for(let i=0;i<workout.exercises.length;i++){
    if(isCheckable(workout.exercises[i]) && !checks[i]) return i;
  }
  return null;
}
function computeCompletion(workout){
  const checks = getChecksFor(workout.id);
  const idxs = workout.exercises
    .map((ex,i)=>({ex,i}))
    .filter(({ex})=>isCheckable(ex))
    .map(({i})=>i);

  const done = idxs.filter(i => !!checks[i]).length;
  const total = idxs.length;
  const pct = total ? Math.round((done/total)*100) : 0;
  return { done, total, pct, allDone: total>0 && done===total };
}
function updateProgress(workout){
  const { done, total, pct, allDone } = computeCompletion(workout);
  $("progressText").textContent = `${done} / ${total}`;
  $("progressBar").style.width = `${pct}%`;
  $("workoutSubtitle").textContent = `Completion: ${pct}%`;
  $("completeHint").textContent = allDone ? "Ready" : "Finish all exercises";
  $("markCompleteBtn").disabled = !allDone;
}

function toMeta(ex){
  if(isRackVideo(ex)) return ["Video"];
  if(isBenchSetsExercise(ex)) return ["Bench Sets"];
  if(ex && isTimed(ex)) return ["Timed", formatTime(ex.seconds)];
  return ["Exercise"];
}
function findNextCheckableIndex(workout, fromIdx){
  for(let i=fromIdx+1;i<workout.exercises.length;i++){
    if(isCheckable(workout.exercises[i])) return i;
  }
  return null;
}
function findPrevCheckableIndex(workout, fromIdx){
  for(let i=fromIdx-1;i>=0;i--){
    if(isCheckable(workout.exercises[i])) return i;
  }
  return null;
}
function findVideoForExercise(workout, label){
  const vids = Array.isArray(workout.videos) ? workout.videos : [];
  return vids.find(v => v.label === label) || vids.find(v => label.includes(v.label));
}

/* ===== TIMER OVERRIDES ===== */
function ovKey(workoutId, exIdx){ return `${workoutId}::${exIdx}`; }
function getOverrideSeconds(workoutId, exIdx){
  const v = state.timerOverrides?.[ovKey(workoutId, exIdx)];
  return (Number.isFinite(v) && v>=10 && v<=600) ? v : null;
}
function setOverrideSeconds(workoutId, exIdx, seconds){
  if(!state.timerOverrides) state.timerOverrides = {};
  state.timerOverrides[ovKey(workoutId, exIdx)] = seconds;
  saveJSON(STORAGE_KEY, state);
}
function readCustomSeconds(){
  const raw = ($("timerSecondsInput").value || "").trim();
  if(raw === "") return null;
  const n = parseInt(raw, 10);
  if(Number.isFinite(n) && n>=10 && n<=600) return n;
  return null;
}
function pauseTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  state.timer.running = false;
  saveJSON(STORAGE_KEY, state);
  $("timerStartPause").textContent = "Start";
}
function resetTimerTo(seconds){
  pauseTimer();
  state.timer.duration = seconds;
  state.timer.remaining = seconds;
  state.timer.finished = false;
  saveJSON(STORAGE_KEY, state);
  $("timerBig").textContent = formatTime(state.timer.remaining);
}

/* Flash hold */
function showFlashHold(){
  $("flashHold").classList.add("on");
  $("flashHoldHint").classList.add("show");
}
function hideFlashHold(){
  $("flashHold").classList.remove("on");
  $("flashHoldHint").classList.remove("show");
}
function onTimerFinishedAdvance(){
  state.timer.finished = true;
  saveJSON(STORAGE_KEY, state);
  showFlashHold();
  beep(950,110); setTimeout(()=>beep(760,130), 140);
}

/* tick */
function tick(){
  state.timer.remaining -= 1;
  if(state.timer.remaining < 0) state.timer.remaining = 0;

  if(state.timer.remaining === 0){
    stopTimerHard();
    onTimerFinishedAdvance();
  }

  saveJSON(STORAGE_KEY, state);
  $("timerBig").textContent = formatTime(state.timer.remaining);
}
function startTimer(){
  if(timerInterval) return;
  const custom = readCustomSeconds();
  const w = WORKOUTS[currentIndex];
  if(custom != null){
    setOverrideSeconds(w.id, state.timer.exerciseIndex, custom);
    state.timer.duration = custom;
    state.timer.remaining = custom;
  }
  state.timer.running = true;
  state.timer.finished = false;
  saveJSON(STORAGE_KEY, state);
  $("timerStartPause").textContent = "Pause";
  beep(520,70);
  timerInterval = setInterval(tick, 1000);
}

/* ===== HISTORY ===== */
function ensureHistory(){
  if(!Array.isArray(state.history)) state.history = [];
}
function addWorkoutHistoryEntry(workout){
  ensureHistory();
  const entry = {
    type: "workout",
    date: todayKey,
    title: workout.title,
    workoutId: workout.id,
    ts: Date.now(),
    workoutSnapshot: JSON.parse(JSON.stringify(workout))
  };
  const exists = state.history.some(h => h.type==="workout" && h.date===entry.date && h.workoutId===entry.workoutId);
  if(!exists){
    state.history.unshift(entry);
    saveJSON(STORAGE_KEY, state);
  }
}
function addManualHistoryEntry(dateKey, title, minutes, notes){
  ensureHistory();
  const entry = { type:"manual", date:dateKey, title, minutes:minutes ?? null, notes:notes ?? "", ts:Date.now() };
  state.history.unshift(entry);
  saveJSON(STORAGE_KEY, state);
}
function deleteHistoryEntry(ts){
  ensureHistory();
  const before = state.history.length;
  state.history = state.history.filter(h => h.ts !== ts);
  if(state.history.length !== before) saveJSON(STORAGE_KEY, state);
}
function ymd(y,m,d){
  const mm = String(m+1).padStart(2,"0");
  const dd = String(d).padStart(2,"0");
  return `${y}-${mm}-${dd}`;
}
function formatMonthLabel(y,m){
  return new Date(y, m, 1).toLocaleString(undefined, { month:"long", year:"numeric" });
}
function historyByDate(){
  ensureHistory();
  const map = {};
  for(const h of state.history){
    if(!map[h.date]) map[h.date] = [];
    map[h.date].push(h);
  }
  return map;
}
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderHistoryCalendar(){
  const weekdays = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  $("calWeekdays").innerHTML = weekdays.map(w => `<div>${w}</div>`).join("");
  $("calGrid").innerHTML = "";
  $("calMonthLabel").textContent = formatMonthLabel(calYear, calMonth);

  const first = new Date(calYear, calMonth, 1);
  const startDay = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const byDate = historyByDate();

  for(let i=0;i<startDay;i++){
    const cell = document.createElement("div");
    cell.className = "calDay muted";
    cell.innerHTML = `<div class="calNum"></div>`;
    $("calGrid").appendChild(cell);
  }

  for(let d=1; d<=daysInMonth; d++){
    const key = ymd(calYear, calMonth, d);
    const entries = byDate[key] || [];

    const cell = document.createElement("div");
    cell.className = "calDay";
    if(key === todayKey) cell.classList.add("calSelected");
    cell.innerHTML = `<div class="calNum">${d}</div>`;

    if(entries.length){
      const dot = document.createElement("div");
      dot.className = "calDot";
      cell.appendChild(dot);
    }

    cell.addEventListener("click", ()=> openDayModal(key));
    $("calGrid").appendChild(cell);
  }
}

let dayModalDateKey = null;
function openDayModal(dateKey){
  dayModalDateKey = dateKey;
  $("dayModalTitle").textContent = `Log for ${dateKey}`;
  renderDayModalList(dateKey);
  $("manualTitle").value = "";
  $("manualMinutes").value = "";
  $("manualNotes").value = "";
  $("dayModal").style.display = "flex";
}
function renderDayModalList(dateKey){
  const list = $("dayModalList");
  list.innerHTML = "";

  const entries = (historyByDate()[dateKey] || []).slice().sort((a,b)=>a.ts-b.ts);

  if(entries.length === 0){
    const empty = document.createElement("div");
    empty.className = "modalItem";
    empty.innerHTML = `
      <div style="font-weight:950; font-size:13px;">No entries yet</div>
      <div class="modalItemSmall">Add an activity below to track what you did.</div>
    `;
    list.appendChild(empty);
    return;
  }

  entries.forEach((entry)=>{
    const item = document.createElement("div");
    item.className = "modalItem";

    const timeStr = new Date(entry.ts).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    const pillClass = entry.type === "manual" ? "manual" : "workout";
    const pillText  = entry.type === "manual" ? "Manual" : "Workout";

    const title = entry.title || "(Untitled)";
    const extra =
      entry.type === "manual"
        ? `${timeStr}${(entry.minutes ? " • " + entry.minutes + " min" : "")}`
        : `${timeStr} • ${(entry.workoutSnapshot?.exercises?.length ?? 0)} exercises`;

    let detailsHtml = "";
    if(entry.type === "manual"){
      const notes = (entry.notes || "").trim();
      detailsHtml = notes ? `<div class="modalItemExercises">${notes.replaceAll("\n","<br>")}</div>` : "";
    } else {
      const exList = entry.workoutSnapshot?.exercises?.map(e=>e.label).slice(0, 40) || [];
      detailsHtml = exList.length ? `<div class="modalItemExercises">${exList.map(x=>`• ${x}`).join("<br>")}</div>` : "";
    }

    item.innerHTML = `
      <div class="modalItemTitle">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;">${title}</span>
        <span class="pill ${pillClass}">${pillText}</span>
      </div>
      <div class="modalItemSmall">${extra}</div>
      ${detailsHtml}
      <div class="modalActions">
        <button class="btnDanger" data-del="${entry.ts}">Delete</button>
      </div>
    `;

    item.querySelector("[data-del]").addEventListener("click", ()=>{
      deleteHistoryEntry(entry.ts);
      renderDayModalList(dateKey);
      renderHistoryCalendar();
      toast("Deleted");
    });

    list.appendChild(item);
  });
}

$("dayModalClose").addEventListener("click", ()=> $("dayModal").style.display="none");
$("dayModal").addEventListener("click", (e)=>{ if(e.target.id==="dayModal") $("dayModal").style.display="none"; });

$("manualSaveBtn").addEventListener("click", ()=>{
  if(!dayModalDateKey) return;

  const title = ($("manualTitle").value || "").trim();
  const minutesRaw = ($("manualMinutes").value || "").trim();
  const notes = ($("manualNotes").value || "").trim();

  if(!title){ toast("Add a title"); return; }

  let minutes = null;
  if(minutesRaw){
    const n = parseInt(minutesRaw, 10);
    if(Number.isFinite(n) && n > 0 && n <= 999) minutes = n;
    else { toast("Minutes must be a number"); return; }
  }

  addManualHistoryEntry(dayModalDateKey, title, minutes, notes);
  renderDayModalList(dayModalDateKey);
  renderHistoryCalendar();

  $("manualTitle").value = "";
  $("manualMinutes").value = "";
  $("manualNotes").value = "";

  toast("Saved");
});

/* ===== CELEBRATION ===== */
const CELEBRATION_MESSAGES = [
  "Good job not being a total fucking loser today.",
  "Congrats. You moved your body. The bar is low, but you cleared it.",
  "You did the workout. Try not to pass out from the responsibility.",
  "Look at you, doing hard things on purpose.",
  "Another workout completed. Shocking behavior."
];
function spawnConfetti(){
  const box = $("confetti"); box.innerHTML="";
  for(let i=0;i<22;i++){
    const p=document.createElement("i");
    p.style.left = Math.random()*100+"%";
    p.style.animationDelay = (Math.random()*0.12)+"s";
    const colors=["rgba(124,92,255,.9)","rgba(45,226,230,.9)","rgba(45,212,191,.9)","rgba(255,255,255,.85)"];
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.width = (8+Math.random()*6)+"px";
    p.style.height= (10+Math.random()*8)+"px";
    box.appendChild(p);
  }
}
let celebTimeout=null;
function hideCelebration(){
  $("overlay").style.display="none";
  if(celebTimeout) clearTimeout(celebTimeout);
  celebTimeout=null;
}
function showCelebration(){
  $("celebrateMsg").textContent = CELEBRATION_MESSAGES[Math.floor(Math.random()*CELEBRATION_MESSAGES.length)];
  spawnConfetti();
  $("overlay").style.display="flex";
  successChime();
  if(celebTimeout) clearTimeout(celebTimeout);
  celebTimeout=setTimeout(hideCelebration, 10000);
}
$("overlay").addEventListener("click", hideCelebration);

/* ===== Advance helper for timer-finish tap ===== */
function advanceToNextExercise(){
  const w = WORKOUTS[currentIndex];
  const idx = getActiveIndex(w);
  const next = findNextCheckableIndex(w, idx);
  if(next === null) return;
  stopTimerHard();
  state.timer.finished = false;
  hideFlashHold();
  saveJSON(STORAGE_KEY, state);
  setActiveIndex(w.id, next);
  renderWorkout();
}
function handleGlobalTapForTimerFinish(){
  const inWorkoutView = $("view-workout").classList.contains("active");
  if(!inWorkoutView) return;
  if(state.timer && state.timer.finished){
    state.timer.finished = false;
    hideFlashHold();
    saveJSON(STORAGE_KEY, state);
    advanceToNextExercise();
  }
}
document.addEventListener("pointerdown", handleGlobalTapForTimerFinish, { passive:true });

/* ===== RENDER WORKOUT ===== */
function renderWorkout(){
  todayKey = getLocalDateKey();
  $("todayLabel").textContent = `Today: ${todayKey}`;

  if(state.lastDate !== todayKey){
    state.lastDate = todayKey;
    saveJSON(STORAGE_KEY, state);
  }

  const w = WORKOUTS[currentIndex];
  $("workoutTitle").textContent = w.title;
  $("cycleLabel").textContent = `${currentIndex+1}/${WORKOUTS.length}`;

  const prevWorkout = WORKOUTS[(currentIndex - 1 + WORKOUTS.length) % WORKOUTS.length];
  const nextWorkout = WORKOUTS[(currentIndex + 1) % WORKOUTS.length];
  $("prevWorkoutLabel").textContent = prevWorkout?.title || "—";
  $("nextWorkoutLabel").textContent = nextWorkout?.title || "—";

  const checks = getChecksFor(w.id);

  let activeIdx = getActiveIndex(w);
  if(activeIdx < 0 || activeIdx >= w.exercises.length) activeIdx = 0;

  /* ✅ CHANGE: DO NOT auto-jump away from checked exercises anymore.
     You can go back and view completed ones as checked. */
  const ex = w.exercises[activeIdx];

  $("activeCount").textContent = `${activeIdx+1}/${w.exercises.length}`;
  $("paneCount").textContent = `${activeIdx+1} / ${w.exercises.length}`;

  $("activeTitle").textContent = ex?.label ?? "—";
  $("activeLabel").textContent = ex?.label ?? "—";

  const meta = $("activeMeta");
  meta.innerHTML="";
  toMeta(ex).forEach((m,i)=>{
    const s=document.createElement("span");
    s.textContent=m;
    meta.appendChild(s);
    if(i<toMeta(ex).length-1){
      const d=document.createElement("span");
      d.textContent="•"; d.style.opacity=".6";
      meta.appendChild(d);
    }
  });

  $("activeCheckbox").checked = !!checks[activeIdx];

  const benchWrap = $("benchSets");
  const benchPills = $("benchPills");
  const isBench = isBenchSetsExercise(ex);

  if(isBench){
    benchWrap.classList.add("show");
    $("benchSetsLabel").textContent = "Bench — 5 Sets";
    benchPills.innerHTML = "";

    const arr = getBenchArray(w.id, activeIdx, 5);

    arr.forEach((done, i)=>{
      const pill = document.createElement("div");
      pill.className = "benchPill" + (done ? " done" : "");
      pill.textContent = String(i+1);
      pill.addEventListener("click", ()=>{
        const updated = setBenchValue(w.id, activeIdx, i, !arr[i]);
        const all = updated.every(Boolean);
        setCheck(w.id, activeIdx, all);
        renderWorkout();
        updateProgress(w);
      });
      benchPills.appendChild(pill);
    });

    $("activeCheckRow").onclick = ()=>{
      const currentArr = getBenchArray(w.id, activeIdx, 5);
      const allDone = currentArr.every(Boolean);
      const newVal = !allDone;
      for(let i=0;i<5;i++) setBenchValue(w.id, activeIdx, i, newVal);
      setCheck(w.id, activeIdx, newVal);
      stopTimerHard();
      renderWorkout();
      updateProgress(w);
    };
    $("activeCheckbox").onchange = ()=>{};
    $("activeCheckbox").checked = getBenchArray(w.id, activeIdx, 5).every(Boolean);
  } else {
    benchWrap.classList.remove("show");
    benchPills.innerHTML = "";

    $("activeCheckRow").onclick = (e)=>{
      if(e.target && e.target.id==="activeCheckbox") return;
      $("activeCheckbox").checked = !$("activeCheckbox").checked;
      $("activeCheckbox").dispatchEvent(new Event("change"));
    };
    $("activeCheckbox").onchange = ()=>{
      const v = $("activeCheckbox").checked;
      setCheck(w.id, activeIdx, v);
      stopTimerHard();

      // keep "auto-advance" only when you check something ON
      if(v){
        const nextUn = findFirstUncheckedIndex(w);
        if(nextUn !== null) setActiveIndex(w.id, nextUn);
      } else {
        setActiveIndex(w.id, activeIdx);
      }

      renderWorkout();
      updateProgress(w);
    };
  }

  const prevIdx = findPrevCheckableIndex(w, activeIdx);
  const nextIdx = findNextCheckableIndex(w, activeIdx);
  $("activePrevBtn").disabled = prevIdx === null;
  $("activeNextBtn").disabled = nextIdx === null;

  const vbox = $("activeVideoBox");
  const vframe = $("activeVideoFrame");
  if(isRackVideo(ex)){
    const vid = findVideoForExercise(w, ex.label);
    const embed = toEmbedUrl(vid?.url || "");
    if(embed){
      vframe.src = embed;
      vbox.classList.add("show");
    } else {
      vframe.src = "";
      vbox.classList.remove("show");
    }
  } else {
    vframe.src = "";
    vbox.classList.remove("show");
  }

  if(nextIdx === null) $("nextTitle").textContent = "No next exercise";
  else $("nextTitle").textContent = w.exercises[nextIdx].label;

  const timerCard = $("timerCard");
  if(isRackVideo(ex) || isBench){
    stopTimerHard();
    timerCard.style.display = "none";
    if(state.timer.finished){
      state.timer.finished = false;
      hideFlashHold();
      saveJSON(STORAGE_KEY, state);
    }
  } else {
    timerCard.style.display = "block";
    const defaultSeconds = isTimed(ex) ? ex.seconds : 60;
    const override = getOverrideSeconds(w.id, activeIdx);
    const desired = override ?? defaultSeconds;

    const needsReset = state.timer.workoutId !== w.id || state.timer.exerciseIndex !== activeIdx;
    if(needsReset){
      stopTimerHard();
      state.timer = { running:false, remaining:desired, duration:desired, workoutId:w.id, exerciseIndex:activeIdx, finished:false };
      $("timerSecondsInput").value="";
      $("timerSecondsInput").placeholder=String(desired);
      hideFlashHold();
      saveJSON(STORAGE_KEY, state);
    } else {
      $("timerSecondsInput").placeholder=String(desired);
    }

    $("timerBig").textContent = formatTime(state.timer.remaining);
    $("timerExerciseName").textContent = `Default ${formatTime(defaultSeconds)}${override ? " • Custom "+formatTime(override) : ""}`;
    $("timerStartPause").textContent = state.timer.running ? "Pause" : "Start";
  }

  updateProgress(w);
}

/* ===== EVENTS ===== */
$("historyChip").addEventListener("click", ()=>{
  setView("history");
  renderHistoryCalendar();
});
$("historyBack").addEventListener("click", ()=> setView("workout"));

$("calPrev").addEventListener("click", ()=>{
  calMonth -= 1;
  if(calMonth < 0){ calMonth = 11; calYear -= 1; }
  renderHistoryCalendar();
});
$("calNext").addEventListener("click", ()=>{
  calMonth += 1;
  if(calMonth > 11){ calMonth = 0; calYear += 1; }
  renderHistoryCalendar();
});

$("activePrevBtn").addEventListener("click", ()=>{
  const w = WORKOUTS[currentIndex];
  const idx = getActiveIndex(w);
  const prev = findPrevCheckableIndex(w, idx);
  if(prev===null) return;
  stopTimerHard();
  state.timer.finished = false;
  hideFlashHold();
  saveJSON(STORAGE_KEY, state);
  setActiveIndex(w.id, prev);
  renderWorkout();
});
$("activeNextBtn").addEventListener("click", ()=>{
  const w = WORKOUTS[currentIndex];
  const idx = getActiveIndex(w);
  const next = findNextCheckableIndex(w, idx);
  if(next===null) return;
  stopTimerHard();
  state.timer.finished = false;
  hideFlashHold();
  saveJSON(STORAGE_KEY, state);
  setActiveIndex(w.id, next);
  renderWorkout();
});

$("prevWorkoutBtn").addEventListener("click", ()=>{
  pauseTimer();
  state.timer.finished = false;
  hideFlashHold();
  currentIndex = (currentIndex - 1 + WORKOUTS.length) % WORKOUTS.length;
  state.currentIndex = currentIndex;
  saveJSON(STORAGE_KEY, state);
  renderWorkout();
});
$("nextWorkoutBtn").addEventListener("click", ()=>{
  pauseTimer();
  state.timer.finished = false;
  hideFlashHold();
  currentIndex = (currentIndex + 1) % WORKOUTS.length;
  state.currentIndex = currentIndex;
  saveJSON(STORAGE_KEY, state);
  renderWorkout();
});

/* Timer controls */
$("timerStartPause").addEventListener("click", async ()=>{
  await unlockAudio();
  if(state.timer.running) pauseTimer();
  else startTimer();
  renderWorkout();
});
$("timerStop").addEventListener("click", ()=>{
  pauseTimer();
  stopTimerHard();
  state.timer.finished = false;
  hideFlashHold();
  toast("Timer stopped");
  renderWorkout();
});
$("timerReset").addEventListener("click", ()=>{
  const w = WORKOUTS[currentIndex];
  const idx = state.timer.exerciseIndex;
  const custom = readCustomSeconds();
  if(custom != null){
    setOverrideSeconds(w.id, idx, custom);
    resetTimerTo(custom);
    beep(660,50);
  } else {
    const ex = w.exercises[idx];
    const def = isTimed(ex) ? ex.seconds : 60;
    const ov = getOverrideSeconds(w.id, idx);
    resetTimerTo(ov ?? def);
  }
  hideFlashHold();
  renderWorkout();
});
$("timerSecondsInput").addEventListener("blur", ()=>{
  const custom = readCustomSeconds();
  if(custom != null){
    const w = WORKOUTS[currentIndex];
    setOverrideSeconds(w.id, state.timer.exerciseIndex, custom);
    if(!state.timer.running) resetTimerTo(custom);
    toast("Custom saved");
  }
});

/* Mark complete */
$("markCompleteBtn").addEventListener("click", ()=>{
  const w = WORKOUTS[currentIndex];
  const { allDone } = computeCompletion(w);
  if(!allDone){ toast("Finish all exercises"); return; }

  addWorkoutHistoryEntry(w);
  showCelebration();

  setTimeout(()=>{
    pauseTimer();
    state.timer.finished = false;
    hideFlashHold();
    currentIndex = (currentIndex + 1) % WORKOUTS.length;
    state.currentIndex = currentIndex;
    saveJSON(STORAGE_KEY, state);
    renderWorkout();
  }, 950);
});

/* INIT */
(async function init(){
  await loadWorkoutsFromFile();

  state = { ...defaultState, ...state };
  if(!state.timerOverrides) state.timerOverrides = {};
  if(!state.setChecks) state.setChecks = {};
  ensureHistory();

  todayKey = getLocalDateKey();
  $("todayLabel").textContent = `Today: ${todayKey}`;

  if(state.lastDate !== todayKey){
    state.lastDate = todayKey;
    saveJSON(STORAGE_KEY, state);
  }

  if (typeof state.currentIndex !== "number") state.currentIndex = 0;
  if (state.currentIndex < 0 || state.currentIndex >= WORKOUTS.length) state.currentIndex = 0;
  currentIndex = state.currentIndex;

  hideFlashHold();
  if(state.timer && state.timer.finished){
    showFlashHold();
  }

  renderWorkout();
})();
</script>
